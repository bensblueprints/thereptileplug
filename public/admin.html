<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | The Reptile Plug</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f0f; --sidebar: #161616; --card: #1a1a1a; --input: #222;
      --border: #2a2a2a; --accent: #e51c1c; --accent-hover: #ff3333;
      --text: #fff; --dim: #999; --muted: #666;
      --green: #2ecc71; --yellow: #f1c40f; --blue: #3498db;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; border: none; background: none; font-family: inherit; color: inherit; }
    input, select, textarea {
      background: var(--input); border: 1px solid var(--border); color: white;
      padding: 10px 14px; border-radius: 8px; font-size: 14px; outline: none;
      font-family: inherit; width: 100%;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 100px; }
    select { cursor: pointer; }

    /* Login */
    .login-page {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .login-box {
      background: var(--card); border: 1px solid var(--border); border-radius: 16px;
      padding: 48px; width: 400px; max-width: 90vw; text-align: center;
    }
    .login-box h1 { font-size: 24px; margin-bottom: 8px; }
    .login-box p { color: var(--dim); font-size: 14px; margin-bottom: 32px; }
    .login-box .form-group { margin-bottom: 16px; text-align: left; }
    .login-box label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--dim); margin-bottom: 6px; }
    .login-box .btn { width: 100%; margin-top: 8px; }
    .login-error { color: var(--accent); font-size: 13px; margin-top: 12px; }

    /* Layout */
    .admin-layout { display: flex; min-height: 100vh; }
    .sidebar {
      width: 260px; background: var(--sidebar); border-right: 1px solid var(--border);
      padding: 24px 0; position: fixed; top: 0; bottom: 0; overflow-y: auto;
    }
    .sidebar-logo {
      padding: 0 24px 24px; border-bottom: 1px solid var(--border);
      margin-bottom: 16px; font-size: 18px; font-weight: 700;
    }
    .sidebar-logo span { color: var(--accent); }
    .sidebar-nav a {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 24px; font-size: 14px; font-weight: 500;
      color: var(--dim); transition: all 0.2s;
    }
    .sidebar-nav a:hover, .sidebar-nav a.active { color: white; background: rgba(229,28,28,0.1); }
    .sidebar-nav a.active { border-right: 3px solid var(--accent); }
    .sidebar-nav a i { width: 20px; text-align: center; }

    .main-content { margin-left: 260px; flex: 1; padding: 32px; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
    .page-header h1 { font-size: 28px; font-weight: 700; }

    /* Cards & Stats */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .stat-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 24px;
    }
    .stat-card .stat-icon {
      width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center;
      font-size: 18px; margin-bottom: 16px;
    }
    .stat-card .stat-icon.red { background: rgba(229,28,28,0.15); color: var(--accent); }
    .stat-card .stat-icon.green { background: rgba(46,204,113,0.15); color: var(--green); }
    .stat-card .stat-icon.blue { background: rgba(52,152,219,0.15); color: var(--blue); }
    .stat-card .stat-icon.yellow { background: rgba(241,196,15,0.15); color: var(--yellow); }
    .stat-card h3 { font-size: 28px; font-weight: 700; }
    .stat-card p { font-size: 13px; color: var(--dim); margin-top: 4px; }

    /* Table */
    .table-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .table-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .table-header h2 { font-size: 16px; font-weight: 600; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 12px 24px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); border-bottom: 1px solid var(--border); }
    td { padding: 14px 24px; border-bottom: 1px solid var(--border); font-size: 14px; }
    tr:last-child td { border-bottom: none; }
    tr:hover { background: rgba(255,255,255,0.02); }

    .status-badge {
      padding: 4px 10px; border-radius: 50px; font-size: 11px; font-weight: 600; text-transform: uppercase;
    }
    .status-pending { background: rgba(241,196,15,0.15); color: var(--yellow); }
    .status-processing { background: rgba(52,152,219,0.15); color: var(--blue); }
    .status-shipped { background: rgba(46,204,113,0.15); color: var(--green); }
    .status-delivered { background: rgba(46,204,113,0.25); color: var(--green); }
    .status-cancelled { background: rgba(229,28,28,0.15); color: var(--accent); }

    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 600;
      transition: all 0.2s;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 6px; }
    .btn-outline { border: 1px solid var(--border); }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
    .btn-danger { background: rgba(229,28,28,0.15); color: var(--accent); }
    .btn-danger:hover { background: var(--accent); color: white; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; visibility: hidden; transition: all 0.3s;
    }
    .modal-overlay.active { opacity: 1; visibility: visible; }
    .modal {
      background: var(--card); border: 1px solid var(--border); border-radius: 16px;
      width: 600px; max-width: 90vw; max-height: 90vh; overflow-y: auto;
    }
    .modal-header {
      padding: 20px 24px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-header h2 { font-size: 18px; }
    .modal-body { padding: 24px; }
    .modal-body .form-group { margin-bottom: 16px; }
    .modal-body label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--dim); margin-bottom: 6px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }

    .product-thumb {
      width: 40px; height: 40px; border-radius: 8px; background: var(--input);
      display: flex; align-items: center; justify-content: center; overflow: hidden;
      font-size: 16px; color: var(--muted);
    }
    .product-thumb img { width: 100%; height: 100%; object-fit: cover; }

    .toggle { position: relative; width: 44px; height: 24px; cursor: pointer; }
    .toggle input { display: none; }
    .toggle-slider {
      position: absolute; inset: 0; background: var(--input); border-radius: 12px;
      transition: 0.3s; border: 1px solid var(--border);
    }
    .toggle-slider::before {
      content: ''; position: absolute; width: 18px; height: 18px;
      border-radius: 50%; background: white; left: 2px; top: 2px;
      transition: 0.3s;
    }
    .toggle input:checked + .toggle-slider { background: var(--accent); border-color: var(--accent); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(20px); }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main-content { margin-left: 0; padding: 16px; }
      .form-row { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      td, th { padding: 10px 12px; font-size: 13px; }
    }
  </style>
</head>
<body>
  <div id="adminApp"></div>

  <script>
    let currentSection = 'dashboard';

    async function checkAuth() {
      const res = await fetch('/api/admin/check');
      const data = await res.json();
      if (data.authenticated) renderAdmin();
      else renderLogin();
    }

    function renderLogin() {
      document.getElementById('adminApp').innerHTML = `
        <div class="login-page">
          <div class="login-box">
            <h1>Admin Login</h1>
            <p>The Reptile Plug Dashboard</p>
            <form onsubmit="doLogin(event)">
              <div class="form-group">
                <label>Username</label>
                <input type="text" id="loginUser" value="admin" required>
              </div>
              <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPass" required>
              </div>
              <button type="submit" class="btn btn-primary">
                <i class="fas fa-sign-in-alt"></i> Sign In
              </button>
              <div class="login-error" id="loginError"></div>
            </form>
          </div>
        </div>
      `;
    }

    async function doLogin(e) {
      e.preventDefault();
      const res = await fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: document.getElementById('loginUser').value, password: document.getElementById('loginPass').value })
      });
      const data = await res.json();
      if (data.success) renderAdmin();
      else document.getElementById('loginError').textContent = data.error || 'Invalid credentials';
    }

    async function doLogout() {
      await fetch('/api/admin/logout', { method: 'POST' });
      renderLogin();
    }

    function renderAdmin() {
      document.getElementById('adminApp').innerHTML = `
        <div class="admin-layout">
          <div class="sidebar">
            <div class="sidebar-logo"><span>RP</span> Admin</div>
            <nav class="sidebar-nav">
              <a href="#" class="active" data-section="dashboard" onclick="showSection('dashboard',this)"><i class="fas fa-chart-line"></i> Dashboard</a>
              <a href="#" data-section="products" onclick="showSection('products',this)"><i class="fas fa-box"></i> Products</a>
              <a href="#" data-section="orders" onclick="showSection('orders',this)"><i class="fas fa-shopping-bag"></i> Orders</a>
              <a href="#" data-section="categories" onclick="showSection('categories',this)"><i class="fas fa-tags"></i> Categories</a>
              <a href="#" data-section="subscribers" onclick="showSection('subscribers',this)"><i class="fas fa-envelope"></i> Email List</a>
              <a href="#" data-section="integrations" onclick="showSection('integrations',this)"><i class="fas fa-plug"></i> Integrations</a>
              <a href="#" data-section="settings" onclick="showSection('settings',this)"><i class="fas fa-cog"></i> Settings</a>
              <a href="#" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
              <a href="/" target="_blank"><i class="fas fa-external-link-alt"></i> View Store</a>
            </nav>
          </div>
          <div class="main-content" id="adminContent"></div>
        </div>
        <div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
          <div class="modal" id="modal"></div>
        </div>
      `;
      showSection('dashboard');
    }

    function showSection(section, el) {
      if (el) {
        event.preventDefault();
        document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.remove('active'));
        el.classList.add('active');
      }
      currentSection = section;
      switch(section) {
        case 'dashboard': loadDashboard(); break;
        case 'products': loadProducts(); break;
        case 'orders': loadOrders(); break;
        case 'categories': loadCategories(); break;
        case 'subscribers': loadSubscribers(); break;
        case 'integrations': loadIntegrations(); break;
        case 'settings': loadSettings(); break;
      }
    }

    // Dashboard
    async function loadDashboard() {
      const stats = await fetch('/api/admin/stats').then(r => r.json());
      document.getElementById('adminContent').innerHTML = `
        <div class="page-header"><h1>Dashboard</h1></div>
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-icon red"><i class="fas fa-box"></i></div><h3>${stats.totalProducts}</h3><p>Total Products</p></div>
          <div class="stat-card"><div class="stat-icon blue"><i class="fas fa-shopping-bag"></i></div><h3>${stats.totalOrders}</h3><p>Total Orders</p></div>
          <div class="stat-card"><div class="stat-icon green"><i class="fas fa-dollar-sign"></i></div><h3>$${stats.totalRevenue.toFixed(2)}</h3><p>Total Revenue</p></div>
          <div class="stat-card"><div class="stat-icon yellow"><i class="fas fa-clock"></i></div><h3>${stats.pendingOrders}</h3><p>Pending Orders</p></div>
        </div>
        ${stats.lowStock > 0 ? `<div style="background:rgba(241,196,15,0.1);border:1px solid rgba(241,196,15,0.3);border-radius:8px;padding:14px 20px;margin-bottom:24px;font-size:14px;"><i class="fas fa-exclamation-triangle" style="color:var(--yellow);margin-right:8px;"></i> ${stats.lowStock} products have low stock (under 3 units)</div>` : ''}
        <div class="table-card">
          <div class="table-header"><h2>Recent Orders</h2></div>
          <table>
            <thead><tr><th>Order #</th><th>Customer</th><th>Total</th><th>Status</th><th>Date</th></tr></thead>
            <tbody>
              ${stats.recentOrders.length ? stats.recentOrders.map(o => `
                <tr>
                  <td><strong>${o.order_number}</strong></td>
                  <td>${o.customer_name}</td>
                  <td>$${o.total.toFixed(2)}</td>
                  <td><span class="status-badge status-${o.status}">${o.status}</span></td>
                  <td>${new Date(o.created_at).toLocaleDateString()}</td>
                </tr>
              `).join('') : '<tr><td colspan="5" style="text-align:center;color:var(--dim);padding:40px;">No orders yet</td></tr>'}
            </tbody>
          </table>
        </div>
      `;
    }

    // Products
    async function loadProducts() {
      const products = await fetch('/api/admin/products').then(r => r.json());
      document.getElementById('adminContent').innerHTML = `
        <div class="page-header">
          <h1>Products (${products.length})</h1>
          <button class="btn btn-primary" onclick="openProductModal()"><i class="fas fa-plus"></i> Add Product</button>
        </div>
        <div class="table-card">
          <table>
            <thead><tr><th></th><th>Name</th><th>Category</th><th>Price</th><th>Stock</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody>
              ${products.map(p => `
                <tr>
                  <td><div class="product-thumb">${p.image ? `<img src="${p.image}">` : '<i class="fas fa-image"></i>'}</div></td>
                  <td><strong>${p.name}</strong>${p.morph ? `<br><span style="font-size:12px;color:var(--dim);">${p.morph}</span>` : ''}</td>
                  <td><span style="font-size:13px;color:var(--dim);">${p.category_name || '-'}</span></td>
                  <td>$${p.price.toFixed(2)}${p.compare_price ? `<br><span style="font-size:11px;color:var(--muted);text-decoration:line-through;">$${p.compare_price.toFixed(2)}</span>` : ''}</td>
                  <td>${p.stock <= 0 ? '<span style="color:var(--accent);">0</span>' : p.stock <= 3 ? `<span style="color:var(--yellow);">${p.stock}</span>` : p.stock}</td>
                  <td>${p.active ? '<span style="color:var(--green);">Active</span>' : '<span style="color:var(--muted);">Inactive</span>'}</td>
                  <td>
                    <button class="btn btn-sm btn-outline" onclick="editProduct(${p.id})"><i class="fas fa-edit"></i></button>
                    <button class="btn btn-sm btn-danger" onclick="deleteProduct(${p.id},'${p.name.replace(/'/g,"\\'")}')"><i class="fas fa-trash"></i></button>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    async function openProductModal(product = null) {
      const categories = await fetch('/api/admin/categories').then(r => r.json());
      document.getElementById('modal').innerHTML = `
        <div class="modal-header">
          <h2>${product ? 'Edit' : 'Add'} Product</h2>
          <button onclick="closeModal()"><i class="fas fa-times"></i></button>
        </div>
        <form id="productForm" onsubmit="saveProduct(event, ${product ? product.id : 'null'})" enctype="multipart/form-data">
          <div class="modal-body">
            <div class="form-group">
              <label>Name</label>
              <input type="text" name="name" required value="${product ? product.name : ''}">
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Price</label>
                <input type="number" name="price" step="0.01" required value="${product ? product.price : ''}">
              </div>
              <div class="form-group">
                <label>Compare Price</label>
                <input type="number" name="compare_price" step="0.01" value="${product?.compare_price || ''}">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Category</label>
                <select name="category_id">
                  <option value="">None</option>
                  ${categories.map(c => `<option value="${c.id}" ${product?.category_id === c.id ? 'selected' : ''}>${c.name}</option>`).join('')}
                </select>
              </div>
              <div class="form-group">
                <label>Stock</label>
                <input type="number" name="stock" value="${product ? product.stock : '0'}">
              </div>
            </div>
            <div class="form-group">
              <label>Description</label>
              <textarea name="description">${product?.description || ''}</textarea>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Sex</label>
                <select name="sex">
                  <option value="">N/A</option>
                  <option ${product?.sex === 'Male' ? 'selected' : ''}>Male</option>
                  <option ${product?.sex === 'Female' ? 'selected' : ''}>Female</option>
                  <option ${product?.sex === 'Unsexed' ? 'selected' : ''}>Unsexed</option>
                </select>
              </div>
              <div class="form-group">
                <label>Age</label>
                <select name="age">
                  <option value="">N/A</option>
                  <option ${product?.age === 'Baby' ? 'selected' : ''}>Baby</option>
                  <option ${product?.age === 'Juvenile' ? 'selected' : ''}>Juvenile</option>
                  <option ${product?.age === 'Sub-Adult' ? 'selected' : ''}>Sub-Adult</option>
                  <option ${product?.age === 'Adult' ? 'selected' : ''}>Adult</option>
                </select>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Morph</label>
                <input type="text" name="morph" value="${product?.morph || ''}">
              </div>
              <div class="form-group">
                <label>Weight</label>
                <input type="text" name="weight" value="${product?.weight || ''}">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Featured</label>
                <label class="toggle"><input type="checkbox" name="featured" value="true" ${product?.featured ? 'checked' : ''}><span class="toggle-slider"></span></label>
              </div>
              <div class="form-group">
                <label>Active</label>
                <label class="toggle"><input type="checkbox" name="active" value="true" ${product ? (product.active ? 'checked' : '') : 'checked'}><span class="toggle-slider"></span></label>
              </div>
            </div>
            <div class="form-group">
              <label>Product Image</label>
              <input type="file" name="image" accept="image/*" style="padding:8px;">
              ${product?.image ? `<input type="hidden" name="existing_image" value="${product.image}"><img src="${product.image}" style="width:80px;height:80px;border-radius:8px;object-fit:cover;margin-top:8px;">` : ''}
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save</button>
          </div>
        </form>
      `;
      document.getElementById('modalOverlay').classList.add('active');
    }

    async function saveProduct(e, id) {
      e.preventDefault();
      const form = document.getElementById('productForm');
      const data = new FormData(form);
      if (!data.get('featured')) data.set('featured', 'false');
      if (!data.get('active')) data.set('active', 'false');

      const url = id ? `/api/admin/products/${id}` : '/api/admin/products';
      const method = id ? 'PUT' : 'POST';
      await fetch(url, { method, body: data });
      closeModal();
      loadProducts();
    }

    async function editProduct(id) {
      const product = await fetch(`/api/admin/products/${id}`).then(r => r.json());
      openProductModal(product);
    }

    async function deleteProduct(id, name) {
      if (!confirm(`Delete "${name}"?`)) return;
      await fetch(`/api/admin/products/${id}`, { method: 'DELETE' });
      loadProducts();
    }

    // Orders
    async function loadOrders() {
      const orders = await fetch('/api/admin/orders').then(r => r.json());
      document.getElementById('adminContent').innerHTML = `
        <div class="page-header"><h1>Orders (${orders.length})</h1></div>
        <div class="table-card">
          <table>
            <thead><tr><th>Order #</th><th>Customer</th><th>Items</th><th>Total</th><th>Status</th><th>Payment</th><th>Tracking</th><th>Date</th><th>Actions</th></tr></thead>
            <tbody>
              ${orders.length ? orders.map(o => {
                const items = JSON.parse(o.items);
                return `
                <tr>
                  <td><strong>${o.order_number}</strong></td>
                  <td>${o.customer_name}<br><span style="font-size:12px;color:var(--dim);">${o.customer_email}</span></td>
                  <td>${items.map(i => `${i.name} x${i.quantity}`).join('<br>')}</td>
                  <td>$${o.total.toFixed(2)}</td>
                  <td>
                    <select class="status-select" onchange="updateOrderStatus(${o.id}, this.value)" style="background:transparent;border:none;color:white;font-size:13px;padding:4px;">
                      ${['pending','processing','shipped','delivered','cancelled'].map(s => `<option value="${s}" ${o.status === s ? 'selected' : ''}>${s.charAt(0).toUpperCase() + s.slice(1)}</option>`).join('')}
                    </select>
                  </td>
                  <td>${new Date(o.created_at).toLocaleDateString()}</td>
                  <td style="color:${o.payment_status==='paid'?'var(--green)':'var(--yellow)'};">${o.payment_status||'unpaid'}</td>
                  <td>${o.tracking_number||'<span style="color:var(--muted);">—</span>'}</td>
                  <td>

    async function showApiShip(orderId) {
      document.getElementById('shipContent').innerHTML = '<p style="text-align:center;color:var(--dim);padding:20px;">Loading rates...</p>';
      try {
        const res = await fetch('/api/shipping/rates', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({orderId}) });
        const data = await res.json();
        if (data.error) { document.getElementById('shipContent').innerHTML = '<p style="color:var(--accent);padding:20px;">'+data.error+'</p>'; return; }
        document.getElementById('shipContent').innerHTML = `
          <p style="color:var(--dim);font-size:13px;margin-bottom:16px;">Select a shipping rate to purchase a label:</p>
          ${data.rates.map(r => `
            <div style="display:flex;align-items:center;justify-content:space-between;padding:12px;background:var(--input);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;cursor:pointer;" onclick="buyLabel('${data.shipmentId||''}','${r.id||''}','${r.serviceCode||''}','${r.carrier}',${orderId})">
              <div><strong>${r.carrier}</strong> - ${r.service}${r.delivery_days?' ('+r.delivery_days+' days)':''}</div>
              <div style="color:var(--green);font-weight:700;">$${r.rate.toFixed(2)}</div>
            </div>
          `).join('')}`;
      } catch(e) { document.getElementById('shipContent').innerHTML = '<p style="color:var(--accent);">Failed to load rates. Check shipping settings.</p>'; }
    }

    async function buyLabel(shipmentId, rateId, serviceCode, carrier, orderId) {
      if (!confirm('Purchase this shipping label?')) return;
      document.getElementById('shipContent').innerHTML = '<p style="text-align:center;color:var(--dim);padding:20px;">Creating label...</p>';
      const res = await fetch('/api/shipping/label', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({shipmentId,rateId,serviceCode,carrierCode:carrier,orderId}) });
      const data = await res.json();
      if (data.success) {
        document.getElementById('shipContent').innerHTML = `
          <div style="text-align:center;padding:20px;">
            <div style="width:60px;height:60px;border-radius:50%;background:rgba(46,204,113,0.1);border:2px solid var(--green);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:24px;color:var(--green);"><i class="fas fa-check"></i></div>
            <h3>Label Created!</h3>
            <p style="color:var(--dim);">Tracking: <strong style="color:white;">${data.tracking}</strong></p>
            <p style="color:var(--dim);">Carrier: ${data.carrier}</p>
            ${data.labelUrl?`<a href="${data.labelUrl}" target="_blank" class="btn btn-primary" style="margin-top:16px;"><i class="fas fa-print"></i> Print Label</a>`:''}
          </div>`;
      } else {
        document.getElementById('shipContent').innerHTML = '<p style="color:var(--accent);padding:20px;">Error: '+(data.error||'Unknown')+'</p>';
      }
    }

      closeModal(); loadOrders();
    }

              </select>
            </div>
            <div id="easypostFields" style="display:${settings.shipping_provider==='easypost'?'block':'none'};">
              <div class="form-group" style="margin-bottom:16px;"><label style="display:block;font-size:12px;font-weight:600;text-transform:uppercase;color:var(--dim);margin-bottom:6px;">EasyPost API Key</label><input type="password" name="easypost_api_key" value="${settings.easypost_api_key||''}" placeholder="EZAK..."></div>
            </div>
            <div id="shipstationFields" style="display:${settings.shipping_provider==='shipstation'?'block':'none'};">
              <div class="form-row">
                <div class="form-group" style="margin-bottom:16px;"><label style="display:block;font-size:12px;font-weight:600;text-transform:uppercase;color:var(--dim);margin-bottom:6px;">API Key</label><input type="text" name="shipstation_api_key" value="${settings.shipstation_api_key||''}"></div>
                <div class="form-group" style="margin-bottom:16px;"><label style="display:block;font-size:12px;font-weight:600;text-transform:uppercase;color:var(--dim);margin-bottom:6px;">API Secret</label><input type="password" name="shipstation_api_secret" value="${settings.shipstation_api_secret||''}"></div>
              </div>
            </div>
            <h4 style="font-size:14px;margin:16px 0 12px;color:var(--dim);">Ship From Address</h4>
            <div class="form-row">
              <div class="form-group" style="margin-bottom:16px;"><label style="display:block;font-size:12px;font-weight:600;text-transform:uppercase;color:var(--dim);margin-bottom:6px;">Name</label><input type="text" name="ship_from_name" value="${settings.ship_from_name||''}"></div>
              <div class="form-group" style="margin-bottom:16px;"><label style="display:block;font-size:12px;font-weight:600;text-transform:uppercase;color:var(--dim);margin-bottom:6px;">Phone</label><input type="text" name="ship_from_phone" value="${settings.ship_from_phone||''}"></div>
            </div>
            <div class="form-group" style="margin-bottom:16px;"><label style="display:block;font-size:12px;font-weight:600;text-transform:uppercase;color:var(--dim);margin-bottom:6px;">Street Address</label><input type="text" name="ship_from_street" value="${settings.ship_from_street||''}"></div>
            <div class="form-row">
              <div class="form-group" style="margin-bottom:16px;"><label style="display:block;font-size:12px;font-weight:600;text-transform:uppercase;color:var(--dim);margin-bottom:6px;">City</label><input type="text" name="ship_from_city" value="${settings.ship_from_city||''}"></div>
              <div class="form-group" style="margin-bottom:16px;"><label style="display:block;font-size:12px;font-weight:600;text-transform:uppercase;color:var(--dim);margin-bottom:6px;">State</label><input type="text" name="ship_from_state" value="${settings.ship_from_state||''}"></div>
              <div class="form-group" style="margin-bottom:16px;"><label style="display:block;font-size:12px;font-weight:600;text-transform:uppercase;color:var(--dim);margin-bottom:6px;">ZIP</label><input type="text" name="ship_from_zip" value="${settings.ship_from_zip||''}"></div>
            </div>

            <hr style="border:none;border-top:1px solid var(--border);margin:24px 0;">
            <div class="form-row">
              <div class="form-group" style="margin-bottom:16px;"><label style="display:block;font-size:12px;font-weight:600;text-transform:uppercase;color:var(--dim);margin-bottom:6px;">Store Name</label><input type="text" name="store_name" value="${settings.store_name||''}"></div>
              <div class="form-group" style="margin-bottom:16px;"><label style="display:block;font-size:12px;font-weight:600;text-transform:uppercase;color:var(--dim);margin-bottom:6px;">Store URL</label><input type="text" name="store_url" value="${settings.store_url||''}"></div>
            </div>

            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px;"><i class="fas fa-save"></i> Save All Settings</button>
            <div id="integrationMsg" style="margin-top:12px;font-size:13px;text-align:center;"></div>
          </form>
        </div>`;
    }

    function togglePaymentFields(v) {
      document.getElementById('stripeFields').style.display = v==='stripe'?'block':'none';
      document.getElementById('authFields').style.display = v==='authorizenet'?'block':'none';
    }
    function toggleShipFields(v) {
      document.getElementById('easypostFields').style.display = v==='easypost'?'block':'none';
      document.getElementById('shipstationFields').style.display = v==='shipstation'?'block':'none';
    }

    async function saveIntegrations(e) {
      e.preventDefault();
      const form = e.target;
      const data = {};
      new FormData(form).forEach((v,k) => data[k] = v);
      if (!data.authorizenet_sandbox) data.authorizenet_sandbox = '0';
      const res = await fetch('/api/settings', { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) });
      const r = await res.json();
      const msg = document.getElementById('integrationMsg');
      if (r.success) { msg.style.color='var(--green)'; msg.textContent='Settings saved!'; setTimeout(()=>msg.textContent='',3000); }
      else { msg.style.color='var(--accent)'; msg.textContent=r.error||'Failed'; }
    }

    async function testEmail() {
      const msg = document.getElementById('testEmailResult');
      msg.style.color='var(--dim)'; msg.textContent='Sending...';
      // Save settings first
      const form = document.querySelector('#adminContent form');
      const data = {}; new FormData(form).forEach((v,k) => data[k] = v);
      await fetch('/api/settings', { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) });
      const res = await fetch('/api/email/test', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({to:data.smtp_from_email}) });
      const r = await res.json();
      if (r.success) { msg.style.color='var(--green)'; msg.textContent='Test email sent!'; }
      else { msg.style.color='var(--accent)'; msg.textContent='Failed: '+(r.error||'Unknown'); }
    }

    // Settings
    function loadSettings() {
      document.getElementById('adminContent').innerHTML = `
        <div class="page-header"><h1>Settings</h1></div>
        <div class="table-card" style="max-width:500px;">
          <div class="table-header"><h2>Change Password</h2></div>
          <form onsubmit="changePassword(event)" style="padding:24px;">
            <div class="form-group" style="margin-bottom:16px;">
              <label style="display:block;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-bottom:6px;">Current Password</label>
              <input type="password" name="current" required>
            </div>
            <div class="form-group" style="margin-bottom:16px;">
              <label style="display:block;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-bottom:6px;">New Password</label>
              <input type="password" name="newPassword" required>
            </div>
            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Update Password</button>
            <div id="settingsMsg" style="margin-top:12px;font-size:13px;"></div>
          </form>
        </div>
      `;
    }

    async function changePassword(e) {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(e.target));
      const res = await fetch('/api/admin/change-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      const result = await res.json();
      const msg = document.getElementById('settingsMsg');
      if (result.success) { msg.style.color = 'var(--green)'; msg.textContent = 'Password updated!'; }
      else { msg.style.color = 'var(--accent)'; msg.textContent = result.error; }
    }

    function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }

    // Init
    checkAuth();
  </script>
</body>
</html>
